services:
  postgres:
    image: postgres:16-alpine
    container_name: marco-polo-postgres
    environment:
      POSTGRES_DB: marco_polo
      POSTGRES_USER: marco_polo
      POSTGRES_PASSWORD: marco_polo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marco_polo -d marco_polo"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: marco-polo-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://marco_polo:marco_polo@postgres:5432/marco_polo?sslmode=disable"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
